# Redirect HTTP to HTTPS (port 8444)
<VirtualHost *:80>
    ServerName photobooth.marlowfm.co.uk
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}:8444$1 [R=301,L]
</VirtualHost>

# HTTPS on standard port 443 (internal access)
<VirtualHost *:443>
    ServerName photobooth.marlowfm.co.uk
    DocumentRoot /var/www/photobooth

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/photobooth.marlowfm.co.uk/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/photobooth.marlowfm.co.uk/privkey.pem

    # TLS 1.2+ only
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder off

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset X-Powered-By

    <Directory /var/www/photobooth>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/photobooth_error.log
    CustomLog ${APACHE_LOG_DIR}/photobooth_access.log combined
</VirtualHost>

