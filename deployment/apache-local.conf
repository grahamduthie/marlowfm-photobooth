# Apache vhost for the LOCAL kiosk machine
# Serves the photobooth app at http://localhost/photobooth/
# Place in /etc/apache2/sites-available/photobooth.conf
# Enable with: sudo a2ensite photobooth && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName localhost
    ServerAlias photobooth

    Alias /photobooth /var/www/html/photobooth/app

    <Directory /var/www/html/photobooth/app>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Allow Apache to read the photos directory
    Alias /photobooth/photos /photos

    <Directory /photos>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/photobooth_error.log
    CustomLog ${APACHE_LOG_DIR}/photobooth_access.log combined
</VirtualHost>
