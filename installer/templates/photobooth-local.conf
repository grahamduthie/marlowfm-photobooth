# Photobooth — local-only mode
# Generated by install.sh
# Accessible at http://<this-machine-ip>/photobooth/

<VirtualHost *:80>
    ServerName {{SERVER_NAME}}

    DocumentRoot /var/www/html

    # ── Photobooth app ────────────────────────────────────────────────────────
    <Directory {{APP_TARGET}}>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── Serve photos from storage directory ──────────────────────────────────
    Alias /photobooth/photos/ /var/photobooth/photos/
    <Directory /var/photobooth/photos/>
        Options -Indexes
        AllowOverride None
        Require all granted
        # Block direct access to metadata
        <FilesMatch "\.json$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ── Protect sensitive files ───────────────────────────────────────────────
    <FilesMatch "(config\.php|\.metadata\.json)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog  /var/log/apache2/photobooth_error.log
    CustomLog /var/log/apache2/photobooth_access.log combined
</VirtualHost>
