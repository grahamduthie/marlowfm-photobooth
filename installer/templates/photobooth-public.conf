# Photobooth — public / internet-accessible mode
# Generated by install.sh
#
# After install, run certbot to obtain an SSL certificate:
#   sudo apt install certbot python3-certbot-apache
#   sudo certbot --apache -d {{SERVER_NAME}}
#
# If using a non-standard port (not 443), certbot will not configure it
# automatically — see the SSL section below and edit the certificate paths
# after running certbot.

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName {{SERVER_NAME}}
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}:{{HTTPS_PORT}}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:{{HTTPS_PORT}}>
    ServerName {{SERVER_NAME}}

    DocumentRoot /var/www/html

    # SSL — certbot will populate these paths, or set them manually:
    # SSLEngine on
    # SSLCertificateFile    /etc/letsencrypt/live/{{SERVER_NAME}}/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/{{SERVER_NAME}}/privkey.pem
    # Include /etc/letsencrypt/options-ssl-apache.conf

    # ── Photobooth app ────────────────────────────────────────────────────────
    <Directory {{APP_TARGET}}>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── Serve photos from storage directory ──────────────────────────────────
    Alias /photobooth/photos/ /var/photobooth/photos/
    <Directory /var/photobooth/photos/>
        Options -Indexes
        AllowOverride None
        Require all granted
        <FilesMatch "\.json$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ── Protect sensitive files ───────────────────────────────────────────────
    <FilesMatch "(config\.php|\.metadata\.json)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ── Security headers ──────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  /var/log/apache2/photobooth_error.log
    CustomLog /var/log/apache2/photobooth_access.log combined
</VirtualHost>
